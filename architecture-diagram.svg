<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1D9E75"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">TalentScout AI — Architecture Diagram</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#888">Catalyst Hackathon | Sana Gunda</text>

  <!-- ─── Layer labels ─── -->
  <text x="20" y="100" font-size="10" fill="#aaa" font-weight="500" letter-spacing="1">UI LAYER</text>
  <text x="20" y="210" font-size="10" fill="#aaa" font-weight="500" letter-spacing="1">API LAYER</text>
  <text x="20" y="340" font-size="10" fill="#aaa" font-weight="500" letter-spacing="1">AI MODULES</text>
  <text x="20" y="480" font-size="10" fill="#aaa" font-weight="500" letter-spacing="1">EXTERNAL / DATA</text>

  <!-- ─── UI Layer ─── -->
  <!-- Recruiter UI container -->
  <rect x="80" y="68" width="740" height="108" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="86" text-anchor="middle" font-size="11" fill="#888">React SPA — Recruiter Interface</text>

  <!-- 4 UI tabs -->
  <rect x="100" y="94" width="155" height="64" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="177" y="116" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">1. Parse JD</text>
  <text x="177" y="132" text-anchor="middle" font-size="10" fill="#085041">Paste + extract requirements</text>
  <text x="177" y="148" text-anchor="middle" font-size="10" fill="#085041">Skills · Exp · Location · Role</text>

  <rect x="275" y="94" width="155" height="64" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="1"/>
  <text x="352" y="116" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">2. Discover</text>
  <text x="352" y="132" text-anchor="middle" font-size="10" fill="#0C447C">Scan profiles, rank by</text>
  <text x="352" y="148" text-anchor="middle" font-size="10" fill="#0C447C">Match Score + explainability</text>

  <rect x="450" y="94" width="155" height="64" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="527" y="116" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489">3. Engage</text>
  <text x="527" y="132" text-anchor="middle" font-size="10" fill="#3C3489">AI conversational outreach</text>
  <text x="527" y="148" text-anchor="middle" font-size="10" fill="#3C3489">Real-time interest scoring</text>

  <rect x="625" y="94" width="175" height="64" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="712" y="116" text-anchor="middle" font-size="12" font-weight="500" fill="#633806">4. Shortlist</text>
  <text x="712" y="132" text-anchor="middle" font-size="10" fill="#633806">Two-axis ranked output</text>
  <text x="712" y="148" text-anchor="middle" font-size="10" fill="#633806">0.6×Match + 0.4×Interest</text>

  <!-- ─── API Layer ─── -->
  <rect x="80" y="180" width="740" height="120" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="450" y="198" text-anchor="middle" font-size="11" fill="#888">FastAPI Backend — REST API</text>

  <!-- API endpoints -->
  <rect x="100" y="206" width="155" height="78" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="177" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#333">POST /parse-jd</text>
  <text x="177" y="240" text-anchor="middle" font-size="10" fill="#666">Claude-powered NLP</text>
  <text x="177" y="255" text-anchor="middle" font-size="10" fill="#666">JSON extraction from</text>
  <text x="177" y="270" text-anchor="middle" font-size="10" fill="#666">raw JD text</text>

  <rect x="275" y="206" width="155" height="78" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="352" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#333">POST /discover</text>
  <text x="352" y="240" text-anchor="middle" font-size="10" fill="#666">Weighted scoring engine</text>
  <text x="352" y="255" text-anchor="middle" font-size="10" fill="#666">Skill + exp + location</text>
  <text x="352" y="270" text-anchor="middle" font-size="10" fill="#666">+ role alignment</text>

  <rect x="450" y="206" width="155" height="78" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="527" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#333">POST /assess-interest</text>
  <text x="527" y="240" text-anchor="middle" font-size="10" fill="#666">Claude sentiment analysis</text>
  <text x="527" y="255" text-anchor="middle" font-size="10" fill="#666">Conversation → interest</text>
  <text x="527" y="270" text-anchor="middle" font-size="10" fill="#666">score 0–100</text>

  <rect x="625" y="206" width="175" height="78" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="712" y="224" text-anchor="middle" font-size="11" font-weight="500" fill="#333">POST /shortlist</text>
  <text x="712" y="240" text-anchor="middle" font-size="10" fill="#666">Combined score calc</text>
  <text x="712" y="255" text-anchor="middle" font-size="10" fill="#666">0.6 × Match</text>
  <text x="712" y="270" text-anchor="middle" font-size="10" fill="#666">+ 0.4 × Interest</text>

  <!-- ─── AI Modules Layer ─── -->
  <rect x="80" y="310" width="490" height="130" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <text x="325" y="328" text-anchor="middle" font-size="11" fill="#888">AI Processing Modules (Python)</text>

  <rect x="100" y="336" width="140" height="90" rx="8" fill="#E1F5EE" stroke="#9FE1CB" stroke-width="1"/>
  <text x="170" y="355" text-anchor="middle" font-size="11" font-weight="500" fill="#085041">JD Parser</text>
  <text x="170" y="372" text-anchor="middle" font-size="10" fill="#085041">spaCy NER</text>
  <text x="170" y="387" text-anchor="middle" font-size="10" fill="#085041">Skill extraction</text>
  <text x="170" y="402" text-anchor="middle" font-size="10" fill="#085041">Claude API</text>
  <text x="170" y="417" text-anchor="middle" font-size="10" fill="#085041">JSON structuring</text>

  <rect x="255" y="336" width="140" height="90" rx="8" fill="#E6F1FB" stroke="#B5D4F4" stroke-width="1"/>
  <text x="325" y="355" text-anchor="middle" font-size="11" font-weight="500" fill="#0C447C">Matcher</text>
  <text x="325" y="372" text-anchor="middle" font-size="10" fill="#0C447C">Skill overlap scoring</text>
  <text x="325" y="387" text-anchor="middle" font-size="10" fill="#0C447C">Experience weighting</text>
  <text x="325" y="402" text-anchor="middle" font-size="10" fill="#0C447C">Location scoring</text>
  <text x="325" y="417" text-anchor="middle" font-size="10" fill="#0C447C">Explainability report</text>

  <rect x="410" y="336" width="140" height="90" rx="8" fill="#EEEDFE" stroke="#CECBF6" stroke-width="1"/>
  <text x="480" y="355" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489">Engagement Engine</text>
  <text x="480" y="372" text-anchor="middle" font-size="10" fill="#3C3489">Message generation</text>
  <text x="480" y="387" text-anchor="middle" font-size="10" fill="#3C3489">Sentiment analysis</text>
  <text x="480" y="402" text-anchor="middle" font-size="10" fill="#3C3489">Interest scoring</text>
  <text x="480" y="417" text-anchor="middle" font-size="10" fill="#3C3489">Signal detection</text>

  <!-- ─── Claude API box ─── -->
  <rect x="600" y="310" width="220" height="130" rx="10" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
  <text x="710" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="white">Claude API</text>
  <text x="710" y="352" text-anchor="middle" font-size="11" fill="#9FE1CB">claude-sonnet-4</text>
  <rect x="616" y="364" width="188" height="22" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="710" y="379" text-anchor="middle" font-size="10" fill="white">JD → structured JSON</text>
  <rect x="616" y="392" width="188" height="22" rx="5" fill="rgba(255,255,255,0.15)"/>
  <text x="710" y="407" text-anchor="middle" font-size="10" fill="white">Outreach message generation</text>
  <rect x="616" y="420" width="188" height="14" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="710" y="430" text-anchor="middle" font-size="10" fill="white">Interest signal classification</text>

  <!-- ─── Data Layer ─── -->
  <rect x="80" y="460" width="490" height="80" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <rect x="100" y="472" width="200" height="56" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="200" y="494" text-anchor="middle" font-size="11" font-weight="500" fill="#444">Candidate Database</text>
  <text x="200" y="510" text-anchor="middle" font-size="10" fill="#888">JSON / SQLite (mock)</text>
  <text x="200" y="524" text-anchor="middle" font-size="10" fill="#888">247+ profiles, skills, exp, location</text>

  <rect x="320" y="472" width="230" height="56" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="1"/>
  <text x="435" y="494" text-anchor="middle" font-size="11" font-weight="500" fill="#444">Deployed</text>
  <text x="435" y="510" text-anchor="middle" font-size="10" fill="#888">Frontend → Vercel</text>
  <text x="435" y="524" text-anchor="middle" font-size="10" fill="#888">Backend → Railway / Render</text>

  <!-- ─── Arrows UI → API ─── -->
  <line x1="177" y1="158" x2="177" y2="204" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="352" y1="158" x2="352" y2="204" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="527" y1="158" x2="527" y2="204" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="712" y1="158" x2="712" y2="204" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- API → Modules -->
  <line x1="177" y1="284" x2="170" y2="334" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="352" y1="284" x2="325" y2="334" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="527" y1="284" x2="480" y2="334" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Modules → Claude -->
  <line x1="550" y1="381" x2="598" y2="381" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- Modules → DB -->
  <line x1="325" y1="426" x2="325" y2="458" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="426" x2="200" y2="458" stroke="#ccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="80" y="548" width="740" height="1" fill="#eee"/>
  <circle cx="600" cy="542" r="5" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="610" y="546" font-size="10" fill="#888">Claude API call (dashed = AI-powered)</text>
  <circle cx="730" cy="542" r="5" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="740" y="546" font-size="10" fill="#888">Internal data flow</text>
</svg>
